<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词详情</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f0e6;font-family:"微软雅黑";padding:30px;}
        .container{max-width:800px;margin:0 auto;background:#fff;padding:40px;border-radius:12px;box-shadow:0 0 10px #ccc;}
        h2{text-align:center;color:#8b4513;margin-bottom:25px;}
        .content{font-size:18px;line-height:2.2;margin:20px 0;text-align:center;white-space:pre-wrap;}
        .translate{margin-top:20px;padding:15px;background:#f9f5ee;border-radius:8px;font-size:16px;line-height:1.8;color:#555;}
        .note{margin-top:20px;padding-top:20px;border-top:1px solid #eee;font-size:16px;line-height:1.8;color:#444;}
        .back{display:inline-block;margin-top:30px;padding:10px 20px;background:#8b4513;color:#fff;text-decoration:none;border-radius:6px;}
    </style>
</head>
<body>
    <div class="container">
        <h2 id="title"></h2>
        <div class="content" id="content"></div>
        <div class="translate" id="translate"></div>
        <div class="note" id="note"></div>
        <a class="back" href="index.html">← 返回列表</a>
    </div>

    <script>
        const poemData = [
            {
                title: "渔家傲·天接云涛连晓雾",
                content: "天接云涛连晓雾，星河欲转千帆舞。仿佛梦魂归帝所。闻天语，殷勤问我归何处。\n我报路长嗟日暮，学诗谩有惊人句。九万里风鹏正举。风休住，蓬舟吹取三山去！",
                translate: "【译文】\n水天相接，晨雾连着云涛，银河转动，像无数船只在风浪中飞舞。梦中灵魂仿佛来到天帝居所，听到天帝关切地问我要去往何处。\n我回报说前路漫长、天色已晚，学诗虽能写出惊人诗句却空无用场。愿乘大鹏九万里高飞，风不要停，把我的小船吹到三座仙山去吧！",
                note: "【注释】\n1.云涛：如云似海的波涛。\n2.星河：银河。\n3.帝所：天帝居所。\n4.谩有：空有、徒有。"
            },
            {
                title: "寒夜怨",
                content: "夜云生，夜鸿惊，凄切嘹唳伤夜情。",
                translate: "【译文】\n夜晚云层升起，鸿雁受惊飞起，凄厉的叫声在夜里回荡，让人倍感伤情。",
                note: "【注释】\n1.嘹唳：指声音响亮凄清。\n2.此诗为南朝齐梁时期陶弘景所作，后人认为其格韵与词调《梅花引》相似。"
            },
            {
                title: "饮酒乐",
                content: "蒲桃四时芳醇，琉璃千钟旧宾。夜饮舞迟销烛，朝醒弦促催人。春风秋月长好，欢醉日月言新。",
                translate: "【译文】\n葡萄酒四季香醇，用琉璃杯畅饮，宾客如故。夜里饮酒跳舞直到蜡烛燃尽，清晨酒醒乐声又催促前行。春风秋月永远美好，欢醉之中时光日日如新。",
                note: "【注释】\n1.蒲桃：即葡萄，此处指葡萄酒。\n2.祖之：以此为宗法、效法此体。唐人《破阵乐》《何满子》皆源于此诗格调。"
            },
            {
                title: "江南弄",
                content: "众花杂色满上林，舒芳耀彩垂轻阴。连手蹀蝶舞春心，舞春心，临岁腓，中人望，独踟蹰。",
                translate: "【译文】\n上林苑中百花齐放、色彩缤纷，花开芬芳、光影摇曳，投下轻柔阴影。人们手拉手轻步起舞，满怀春日情思，望着繁茂草木，独自徘徊流连。",
                note: "【注释】\n1.蹀蝶：小步行走貌。\n2.岁腓：指草木繁盛。\n3.踟蹰：徘徊不前的样子。\n4.此为梁武帝萧衍所作，属《江南弄》七曲之一，其句式长短交错，被视作词的滥觞。"
            },
            {
                title: "迎客曲·送客曲",
                content: "丝管列，舞曲陈。含声未奏待嘉宾。罗丝管，陈舞席。敛袖嘿唇迎上客。\n袖缤纷，声委咽。余曲未终高驾别。爵无算，景已流。空纤长袖客不留。",
                translate: "【译文】\n乐器排列整齐，舞曲准备就绪，停声待奏迎接贵宾。整理衣袖、妆容端庄，迎接贵客到来。\n衣袖飞舞、乐声凄婉，曲子未完客人已要离去。尽情饮酒，时光流逝，挥袖相送却无法挽留客人。",
                note: "【注释】\n1.嘿唇：魏晋六朝时女子的一种唇妆。\n2.爵无算：饮酒不计其数，指尽情畅饮。爵，古代酒器。\n3.景已流：时光已经流逝。\n4.此为南朝梁徐勉所作，作者为官严正，有“今夕止可谈风月”之佳话，世人将其与谢安、王俭并称江左风流宰相。"
            },
            {
                title: "三洲歌",
                content: "三洲，断江口。水从窈窕河傍流。啼将别共来，长相思。\n三洲，断江口。水从窈窕河傍流。欢将乐共来，长相思。",
                translate: "【译文】\n三洲地处江口，河水从幽深的河边静静流淌。离别时一同哭泣，从此长久思念。\n三洲地处江口，河水从幽深的河边静静流淌。与爱人共享欢乐，从此长久思念。",
                note: "【注释】\n1.窈窕：深邃幽美貌（注：原文“窃究”“窃宛”为“窈窕”之误）。\n2.欢：南朝民歌中常用来称呼所爱之人。\n3.此为南朝梁代僧人法云所作，可见当时江左文风之盛，出家人作诗亦具深情风致。"
            },
            {
                title: "夜饮朝眠曲",
                content: "忆睡时，待来刚不来。卸妆仍索伴，解佩更相催。博山思结梦，沉水未成灰。\n忆起时，投签初报晓。被惹香黛残，枕隐金钗袅。笑动林中乌，除却司晨鸟。",
                translate: "【译文】\n想起入睡时，等待人却迟迟不来。卸了妆仍想有人相伴，解下佩饰更觉催促。对着香炉希望入梦，香料还未烧成灰烬。\n想起晨起时，漏签刚刚报晓。衣上残留着妆容香气，金钗在枕间轻摇。笑声惊动林中乌鸦，只有报晓鸡不曾被惊扰。",
                note: "【注释】\n1.博山：博山炉的简称，古代焚香的器具。\n2.沉水：即沉香，一种名贵香料。\n3.投签：古代计时器漏壶中的指示签，报晓时投签出声。\n4.司晨鸟：指报晓的公鸡。\n5.此为隋炀帝杨广所作，虽为帝王，但其词风致婉丽，颇具南朝江左之风。"
            },
            {
                title: "高句丽",
                content: "萧萧易水生波，燕赵佳人自多。倾杯覆碗漼漼，垂手奋袖婆娑。不惜黄金散尽，惟畏白日蹉跎。",
                translate: "【译文】\n萧瑟的易水泛起波浪，燕赵之地本来就多美女。举杯饮酒、垂泪相对，舒展衣袖翩翩起舞。不吝惜黄金散尽，只怕时光白白流逝。",
                note: "【注释】\n1.漼漼：涕泣垂泪的样子。\n2.婆娑：舞姿优美、盘旋起舞的样子。\n3.蹉跎：时光白白流逝。\n4.此为北周王褒所作，其声调与南朝陈陆琼《饮酒乐》相同，可见当时南北疆场虽限隔，而声调实相通。"
            },
            {
                title: "穆护砂",
                content: "玉管朝朝弄，清歌日日新。折花当驿路，寄与陇头人。",
                translate: "【译文】\n天天吹奏玉笛，清亮的歌声日日新鲜。在驿路边折下花枝，寄给远在陇头的亲人。",
                note: "【注释】\n1.穆护砂：隋朝曲调名，本为隋代开凿汴河时所作的劳歌。\n2.犯角：指乐曲的音调侵犯了“角”声（五音之一）。\n3.桃根桃叶：指王献之的爱妾桃叶及其妹桃根，后代指江南娇美的女子。"
            },
            {
                title: "回纥·石州",
                content: "阴山瀚海信难通，幽闺少妇罢裁缝。缅想边庭征战苦，谁能对镜冶愁容。久戍人将老，须臾变作白头翁。\n自从君去远巡边，终日罗帷独自眠。看花情转切，揽涕泪如泉。一自离君后，啼多双眼穿。何时狂虏灭，免得更留连。",
                translate: "【译文】\n阴山与瀚海相隔遥远，音信难通，深闺中的少妇停下针线。思念边疆征战的艰辛，谁还有心情对着镜子修饰愁容。长期驻守的人即将老去，转眼之间变成白发老翁。\n自从你远去边疆，我终日在帷帐里独自安眠。看到花儿情意更切，擦泪时泪水如泉涌。自从与你分离，哭到双眼欲穿。何时才能消灭敌寇，让我们不再分离。",
                note: "【注释】\n1.瀚海：原本指北方的大湖，这里泛指北方广阔荒凉的边疆地区。\n2.冶愁容：梳理修饰带着愁容的面容。\n3.这两首均为商调曲，辞意缠绵含蓄，抒写了闺中少妇对远方戍边丈夫的深切思念，当为陈、隋或初唐时期的无名氏之作。"
            },
            {
                title: "六忆辞",
                content: "忆来时，灼灼上阶墀。勤勤叙离别，慊慊道相思。相看常不足，相见乃忘饥。\n忆坐时，黯黯罗帐前。或歌四五曲，或弄两三弦。笑时应莫比，嗔时更可怜。\n忆眠时，人眠强未眠。解罗不待劝，就枕更须牵。复恐傍人见，娇羞在烛前。",
                translate: "【译文】\n想起你来时，光彩照人走上台阶。细细诉说离别之情，诚挚倾诉思念之意。互相凝望总觉得不够，相见后连饥饿都忘记。\n想起同坐时，在幽暗的罗帐前。有时唱几首歌，有时弹几弦琴。笑容无人能比，生气时更显可爱。\n想起入眠时，别人睡了我却难以入睡。宽衣无需劝说，靠近枕头更要依偎。又怕被别人看见，烛光前满是娇羞。",
                note: "【注释】\n1.墀：台阶。\n2.慊慊：诚挚深切的样子（原文“慌慌”为误字）。\n3.可怜：可爱。\n4.此为南朝梁代沈约所作，原诗共六首，今存四首，此处录其三。诗风绮丽，细腻描写了女子相会、对坐、就寝时的娇憨情态。"
            },
        ];

        let idx = location.search.split("idx=")[1];
        let p = poemData[idx];
        document.getElementById("title").innerText = p.title;
        document.getElementById("content").innerText = p.content;
        document.getElementById("translate").innerText = p.translate;
        document.getElementById("note").innerText = p.note;
    </script>
</body>
</html>
