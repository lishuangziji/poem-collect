<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词合集</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f0e6;font-family:"微软雅黑";padding:30px;}
        .container{max-width:800px;margin:0 auto;background:#fff;padding:40px;border-radius:12px;box-shadow:0 0 10px #ccc;}
        h1{text-align:center;color:#8b4513;margin-bottom:30px;}
        .poem-list{list-style:none;}
        .poem-list li{margin:15px 0;}
        .poem-list a{display:block;padding:12px 20px;background:#f9f3e8;color:#8b4513;text-decoration:none;border-radius:8px;font-size:18px;}
        .poem-list a:hover{background:#ffe8cc;}
    </style>
</head>
<body>
    <div class="container">
        <h1>诗词文集</h1>
        <ul class="poem-list" id="list"></ul>
    </div>

    <script>
        // 已同步加上translate译文字段，和详情页完全对应
        const poemData = [
            {
                title: "渔家傲·天接云涛连晓雾",
                content: "天接云涛连晓雾，星河欲转千帆舞。仿佛梦魂归帝所。闻天语，殷勤问我归何处。\n我报路长嗟日暮，学诗谩有惊人句。九万里风鹏正举。风休住，蓬舟吹取三山去！",
                translate: "【译文】\n水天相接，晨雾连着云涛，银河转动，像无数船只在风浪中飞舞。梦中灵魂仿佛来到天帝居所，听到天帝关切地问我要去往何处。\n我回报说前路漫长、天色已晚，学诗虽能写出惊人诗句却空无用场。愿乘大鹏九万里高飞，风不要停，把我的小船吹到三座仙山去吧！",
                note: "【注释】\n1.云涛：如云似海的波涛。\n2.星河：银河。\n3.帝所：天帝居所。\n4.谩有：空有、徒有。"
            },
            {
                title: "寒夜怨",
                content: "夜云生，夜鸿惊，凄切嘹唳伤夜情。",
                translate: "【译文】\n夜晚云层升起，鸿雁受惊飞起，凄厉的叫声在夜里回荡，让人倍感伤情。",
                note: "【注释】\n1.嘹唳：指声音响亮凄清。\n2.此诗为南朝齐梁时期陶弘景所作，后人认为其格韵与词调《梅花引》相似。"
            },
            {
                title: "饮酒乐",
                content: "蒲桃四时芳醇，琉璃千钟旧宾。夜饮舞迟销烛，朝醒弦促催人。春风秋月长好，欢醉日月言新。",
                translate: "【译文】\n葡萄酒四季香醇，用琉璃杯畅饮，宾客如故。夜里饮酒跳舞直到蜡烛燃尽，清晨酒醒乐声又催促前行。春风秋月永远美好，欢醉之中时光日日如新。",
                note: "【注释】\n1.蒲桃：即葡萄，此处指葡萄酒。\n2.祖之：以此为宗法、效法此体。唐人《破阵乐》《何满子》皆源于此诗格调。"
            },
            {
                title: "江南弄",
                content: "众花杂色满上林，舒芳耀彩垂轻阴。连手蹀蝶舞春心，舞春心，临岁腓，中人望，独踟蹰。",
                translate: "【译文】\n上林苑中百花齐放、色彩缤纷，花开芬芳、光影摇曳，投下轻柔阴影。人们手拉手轻步起舞，满怀春日情思，望着繁茂草木，独自徘徊流连。",
                note: "【注释】\n1.蹀蝶：小步行走貌。\n2.岁腓：指草木繁盛。\n3.踟蹰：徘徊不前的样子。\n4.梁武帝萧衍所作，句式长短交错，被视作词的滥觞。"
            },
            {
                title: "迎客曲·送客曲",
                content: "丝管列，舞曲陈。含声未奏待嘉宾。罗丝管，陈舞席。敛袖嘿唇迎上客。\n袖缤纷，声委咽。余曲未终高驾别。爵无算，景已流。空纤长袖客不留。",
                translate: "【译文】\n乐器排列整齐，舞曲准备就绪，停声待奏迎接贵宾。整理衣袖、妆容端庄，迎接贵客到来。\n衣袖飞舞、乐声凄婉，曲子未完客人已要离去。尽情饮酒，时光流逝，挥袖相送却无法挽留客人。",
                note: "【注释】\n1.嘿唇：魏晋六朝女子唇妆。\n2.爵无算：尽情畅饮。\n3.景已流：时光流逝。"
            },
            {
                title: "三洲歌",
                content: "三洲，断江口。水从窈窕河傍流。啼将别共来，长相思。\n三洲，断江口。水从窈窕河傍流。欢将乐共来，长相思。",
                translate: "【译文】\n三洲地处江口，河水幽深流淌。离别相伴哭泣，从此长久相思。\n同享欢乐相伴，往后岁岁长相思。",
                note: "【注释】\n1.窈窕：深邃幽美。\n2.欢：南朝民歌对心上人的称呼。"
            },
            {
                title: "夜饮朝眠曲",
                content: "忆睡时，待来刚不来。卸妆仍索伴，解佩更相催。博山思结梦，沉水未成灰。\n忆起时，投签初报晓。被惹香黛残，枕隐金钗袅。笑动林中乌，除却司晨鸟。",
                translate: "【译文】\n入夜等候故人未至，卸妆仍盼相伴，焚香静待入梦。清晨漏签报晓，枕边妆容零落，笑语惊起林中栖鸟。",
                note: "【注释】\n1.博山：博山香炉。\n2.沉水：沉香香料。\n3.投签：古代报晓计时器。"
            },
            {
                title: "高句丽",
                content: "萧萧易水生波，燕赵佳人自多。倾杯覆碗漼漼，垂手奋袖婆娑。不惜黄金散尽，惟畏白日蹉跎。",
                translate: "【译文】\n易水萧瑟起波澜，燕赵自古多佳人。举杯垂泪、起舞翩跹，不惧散尽千金，只恐时光虚度。",
                note: "【注释】\n1.漼漼：垂泪貌。\n2.婆娑：舞姿盘旋优美。\n3.蹉跎：光阴虚度。"
            },
            {
                title: "穆护砂",
                content: "玉管朝朝弄，清歌日日新。折花当驿路，寄与陇头人。",
                translate: "【译文】\n日日吹笛唱新曲，驿道折下花枝，遥寄给远在陇头的故人。",
                note: "【注释】\n1.穆护砂：隋代曲调名。\n2.陇头：泛指边塞远方。"
            },
            {
                title: "回纥·石州",
                content: "阴山瀚海信难通，幽闺少妇罢裁缝。缅想边庭征战苦，谁能对镜冶愁容。久戍人将老，须臾变作白头翁。\n自从君去远巡边，终日罗帷独自眠。看花情转切，揽涕泪如泉。一自离君后，啼多双眼穿。何时狂虏灭，免得更留连。",
                translate: "【译文】\n边塞遥远音信渺茫，闺中女子停绣怀人。感念征战艰辛，青春易老、岁月催人。自君远赴边疆，独守空闺日日垂泪，只盼战乱平息、早日归乡。",
                note: "【注释】\n1.瀚海：北方荒漠边疆。\n2.冶愁容：含愁梳妆。"
            },
            {
                title: "六忆辞",
                content: "忆来时，灼灼上阶墀。勤勤叙离别，慊慊道相思。相看常不足，相见乃忘饥。\n忆坐时，黯黯罗帐前。或歌四五曲，或弄两三弦。笑时应莫比，嗔时更可怜。\n忆眠时，人眠强未眠。解罗不待劝，就枕更须牵。复恐傍人见，娇羞在烛前。",
                translate: "【译文】\n忆你初来，容颜明艳，细说离别、互诉相思，相见便忘却饥乏。闲坐帐前弹琴歌唱，笑颜动人、嗔态可爱。夜眠娇羞依偎，怕被人窥见，烛前脉脉含情。",
                note: "【注释】\n1.墀：台阶。\n2.慊慊：情意深切。\n3.可怜：可爱。"
            },
            {
                title: "如梦令·常记溪亭日暮",
                content: "常记溪亭日暮，沉醉不知归路。兴尽晚回舟，误入藕花深处。争渡，争渡，惊起一滩鸥鹭。",
                translate: "【译文】\n时常记起溪边亭中日落时分的情景，醉酒沉醉，竟忘了回家的路途。玩到兴致散尽才乘舟晚归，不小心驶入荷花深处。\n奋力划船，奋力划船，惊起了沙滩上一群飞翔的鸥鹭。",
                note: "【注释】\n1.溪亭：溪边的亭台。\n2.日暮：夕阳西下。\n3.沉醉：醉酒沉迷。\n4.藕花：荷花。\n5.争渡：奋力划船争先驶出。\n6.鸥鹭：水鸟，海鸥、白鹭一类。"
            },
            {
                title: "如梦令·昨夜雨疏风骤",
                content: "昨夜雨疏风骤，浓睡不消残酒。试问卷帘人，却道海棠依旧。知否，知否？应是绿肥红瘦。",
                translate: "【译文】\n昨夜雨点稀疏、晚风急猛，沉沉睡了一觉，仍消不尽残留的酒意。试着询问卷帘的侍女，她却说海棠花依旧完好如初。\n你可知道，你可知道？此刻该是绿叶繁茂、红花凋零了。",
                note: "【注释】\n1.雨疏风骤：雨点稀少，晚风猛烈。\n2.浓睡：沉睡、酣睡。\n3.残酒：酒后残留的醉意。\n4.卷帘人：指侍女。\n5.绿肥红瘦：绿叶繁盛，红花凋零。"
            },
            {
                title: "声声慢·寻寻觅觅",
                content: "寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急！雁过也，正伤心，却是旧时相识。\n满地黄花堆积，憔悴损，如今有谁堪摘？守着窗儿，独自怎生得黑！梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！",
                translate: "【译文】\n我四处寻觅，四周却冷清孤寂，满心凄凉悲戚。天气刚转暖又还有寒意的时候，最难以调养安身。喝上几杯淡酒，又怎能抵挡傍晚突如其来的疾风！大雁从天边飞过，正触起我满心伤感，原来都是旧时见过的归雁。\n地上菊花落得满地堆积，已经枯黄憔悴，如今还有谁忍心去采摘？独守窗边，该怎样熬到天黑！梧桐叶上又飘起绵绵细雨，到了黄昏时分，雨点不停滴滴洒落。这般凄凉光景，哪里是一个愁字能概括得了的！",
                note: "【注释】\n1.寻寻觅觅：心神不定，四处张望找寻。\n2.乍暖还寒：秋末天气，刚暖又冷。\n3.将息：调养、安歇。\n4.旧时相识：指北来大雁，似故乡旧识。\n5.黄花：菊花。\n6.憔悴损：枯萎凋零、容颜憔悴。\n7.怎生得黑：怎样熬到天黑。\n8.次第：光景、境况。\n9.了得：概括、了结。"
            }
        ];

        // 渲染列表
        const list = document.getElementById("list");
        poemData.forEach((item,idx)=>{
            let li = document.createElement("li");
            li.innerHTML = `<a href="detail.html?idx=${idx}">${item.title}</a>`;
            list.appendChild(li);
        });
    </script>
</body>
</html>
