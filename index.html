                content: "大江东去，浪淘尽，千古风流人物。\n故垒西边，人道是，三国周郎赤壁。\n乱石穿空，惊涛拍岸，卷起千堆雪。\n江山如画，一时多少豪杰。\n\n遥想公瑾当年，小乔初嫁了，雄姿英发。\n羽扇纶巾，谈笑间，樯橹灰飞烟灭。\n故国神游，多情应笑我，早生华发。\n人生如梦，一尊还酹江月。",
                translate: "【译文】\n大江浩浩荡荡向东流去，滔滔巨浪淘尽了千古英雄人物。那旧营垒的西边，人们说那就是三国周瑜鏖战的赤壁。陡峭的石壁直耸云天，如雷的惊涛拍击着江岸，激起的浪花好似卷起千万堆白雪。雄壮的江山奇丽如图画，一时间涌现出多少英雄豪杰。\n\n遥想当年的周瑜春风得意，绝代佳人小乔刚嫁给他，他英姿奋发豪气满怀。手摇羽扇头戴纶巾，从容潇洒地在说笑闲谈之间，就把强敌的战船烧得灰飞烟灭。我今日神游当年的战地，可笑我多情善感，过早地生出满头白发。人生犹如一场梦，且洒一杯酒祭奠江上的明月。",
                note: "【注释】\n1. 大江：指长江。\n2. 淘：冲洗，冲刷。\n3. 风流人物：指杰出的历史名人。\n4. 故垒：过去遗留下来的营垒。\n5. 周郎：指周瑜，字公瑾，年轻时即有才名，人呼周郎。\n6. 穿空：直插天空。\n7. 拍岸：拍打江岸。\n8. 千堆雪：形容浪花像雪一样白。\n9. 公瑾：周瑜的字。\n10. 小乔：周瑜的妻子。\n11. 雄姿英发：形容周瑜姿容雄伟，英气勃发。\n12. 羽扇纶巾：手持羽扇，头戴纶巾，形容周瑜从容儒雅的风度。\n13. 樯橹：船上的桅杆和船桨，这里代指曹操的水军战船。\n14. 故国神游：“神游故国”的倒文。故国，这里指旧地，当年的赤壁战场。\n15. 华发：花白的头发。\n16. 尊：同“樽”，酒杯。\n17. 酹：将酒洒在地上，以表示凭吊。"
            }
        ];

        // 渲染列表
        const list = document.getElementById("list");
        poemData.forEach((item,idx)=>{
            let li = document.createElement("li");
            li.innerHTML = `<a href="detail.html?idx=${idx}">${item.title}</a>`;
            list.appendChild(li);
        });
    </script>
